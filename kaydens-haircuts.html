<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Now – Kayden's Haircuts</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink: #0a0a0a; --paper: #f5f0e8; --accent: #c8ff00; --muted: #888; --radius: 16px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .widget { background: var(--paper); border-radius: 24px; width: 100%; max-width: 420px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.4); }
  .widget-header { background: var(--ink); padding: 24px; display: flex; align-items: center; gap: 14px; }
  .biz-avatar { width: 48px; height: 48px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--ink); flex-shrink: 0; }
  .biz-info h2 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #fff; letter-spacing: 1px; }
  .biz-info p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .chat-area { padding: 20px; height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: var(--paper); }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .bubble.bot { background: var(--ink); color: #fff; border-bottom-left-radius: 4px; align-self: flex-start; }
  .bubble.user { background: var(--accent); color: var(--ink); border-bottom-right-radius: 4px; align-self: flex-end; font-weight: 500; }
  .bubble.typing { background: var(--ink); color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; display: flex; gap: 4px; align-items: center; padding: 14px 18px; }
  .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  .quick-replies { padding: 0 20px 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .qr-btn { background: transparent; border: 1.5px solid var(--ink); border-radius: 100px; padding: 6px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--ink); }
  .qr-btn:hover { background: var(--ink); color: var(--accent); }
  .input-row { padding: 16px 20px 20px; display: flex; gap: 10px; border-top: 1px solid rgba(0,0,0,0.08); background: var(--paper); }
  .msg-input { flex: 1; border: 1.5px solid rgba(0,0,0,0.15); border-radius: 100px; padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: #fff; outline: none; color: var(--ink); transition: border-color 0.2s; }
  .msg-input:focus { border-color: var(--ink); }
  .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--ink); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.2s; flex-shrink: 0; }
  .send-btn:hover { background: #333; transform: scale(1.05); }
  .send-btn svg { width: 18px; height: 18px; fill: var(--accent); }
  .booking-card { margin: 0 20px 20px; background: var(--ink); border-radius: var(--radius); padding: 18px; color: #fff; display: none; }
  .booking-card.show { display: block; animation: fadeUp 0.3s ease; }
  .booking-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--accent); margin-bottom: 12px; }
  .booking-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .booking-row:last-of-type { border-bottom: none; }
  .booking-row span:first-child { color: var(--muted); }
  .booking-row span:last-child { font-weight: 500; }
  .confirm-btn { width: 100%; margin-top: 14px; background: var(--accent); border: none; border-radius: 10px; padding: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; cursor: pointer; color: var(--ink); transition: opacity 0.2s; }
  .confirm-btn:hover { opacity: 0.85; }
  .cal-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent); background: rgba(200,255,0,0.1); padding: 4px 10px; border-radius: 6px; margin-top: 10px; }
  .powered { text-align: center; font-size: 11px; color: var(--muted); padding: 12px; background: var(--paper); }
  .powered a { color: var(--ink); font-weight: 500; text-decoration: none; }
  .time-picker { padding: 16px 20px; background: var(--paper); border-top: 1px solid rgba(0,0,0,0.08); display: none; }
  .time-picker.show { display: block; animation: fadeUp 0.3s ease; }
  .picker-label { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .day-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; padding: 8px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1.5px solid rgba(0,0,0,0.12); background: transparent; color: var(--ink); transition: all 0.2s; text-align: center; min-width: 48px; }
  .day-tab.active { background: var(--ink); color: var(--accent); border-color: var(--ink); }
  .day-tab.closed { opacity: 0.35; cursor: not-allowed; }
  .slots-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-height: 150px; overflow-y: auto; }
  .slot-btn { padding: 8px 4px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; text-align: center; transition: all 0.15s; }
  .slot-btn.available { background: rgba(200,255,0,0.15); color: #3a5200; }
  .slot-btn.available:hover { background: var(--accent); color: var(--ink); transform: scale(1.04); }
  .slot-btn.booked { background: #f0f0f0; color: #bbb; cursor: not-allowed; text-decoration: line-through; }
  .slots-loading { font-size: 13px; color: var(--muted); text-align: center; padding: 20px 0; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <div class="biz-avatar">KH</div>
    <div class="biz-info">
      <h2>Kayden's Haircuts</h2>
      <p><span class="status-dot"></span>AI Booking · Checks live availability</p>
    </div>
  </div>
  <div class="chat-area" id="chat"></div>
  <div class="quick-replies" id="quick-replies"></div>
  <div class="booking-card" id="booking-card">
    <h3>Your booking</h3>
    <div class="booking-row"><span>Service</span><span id="bc-service">—</span></div>
    <div class="booking-row"><span>Date & time</span><span id="bc-datetime">—</span></div>
    <div class="booking-row"><span>Duration</span><span id="bc-duration">—</span></div>
    <div class="booking-row"><span>Notes</span><span id="bc-notes">—</span></div>
    <button class="confirm-btn" onclick="confirmBooking()">Confirm Booking</button>
    <div class="cal-badge">📅 Will be added to Kayden's calendar automatically</div>
  </div>
  <div class="time-picker" id="time-picker">
    <div class="picker-label">Pick a date & time</div>
    <div class="day-tabs" id="day-tabs"></div>
    <div class="slots-grid" id="slots-grid"><div class="slots-loading">Loading availability…</div></div>
  </div>
  <div class="input-row">
    <input class="msg-input" id="msg-input" type="text" placeholder="Type your message…" />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by <a href="https://thebookerai.com">The Booker AI</a></div>
</div>

<script>
const CONFIG = {
  businessName: "Kayden's Haircuts",
  slug: "kaydens-haircuts",
  timezone: "America/New_York",
  hours: {
    monday: { open: "9:00", close: "18:00" },
    tuesday: { open: "9:00", close: "18:00" },
    wednesday: { open: "9:00", close: "18:00" },
    thursday: { open: "9:00", close: "18:00" },
    friday: { open: "9:00", close: "18:00" },
    saturday: { open: "10:00", close: "16:00" },
    sunday: null
  }
};

const systemPrompt = `You are a friendly AI booking assistant for "Kayden's Haircuts", a professional barbershop/hair salon.

Business hours:
- Monday-Friday: 9am-6pm
- Saturday: 10am-4pm
- Sunday: CLOSED

Services:
- Haircut (30 min)
- Haircut & beard trim (45 min)
- Fade (30 min)
- Shape up (20 min)
- Wash & cut (45 min)
- Kids haircut (20 min)

IMPORTANT RULES:
- Never book outside business hours
- Never book on Sundays
- Always confirm the exact date and time

When you have enough info (service, confirmed date/time), respond ONLY with this JSON:
{"reply":"friendly confirmation message","booking":{"service":"...","datetime":"...","duration":"...","notes":"..."}}

Otherwise reply in plain text. Keep it SHORT and friendly. Today is ${new Date().toDateString()}.`;

let history = [];
let bookingData = null;

function addBubble(text, role) {
  const chat = document.getElementById('chat');
  const b = document.createElement('div');
  b.className = `bubble ${role}`;
  b.textContent = text;
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const b = document.createElement('div');
  b.className = 'bubble typing'; b.id = 'typing';
  b.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function showQuickReplies(replies, isService = false) {
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  replies.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn'; btn.textContent = r;
    btn.onclick = () => {
      qr.innerHTML = '';
      if (isService) {
        addBubble(r, 'user');
        addBubble("Great choice! Pick a date and time below 👇", 'bot');
        showTimePicker(r);
      } else {
        document.getElementById('msg-input').value = r;
        sendMessage();
      }
    };
    qr.appendChild(btn);
  });
}

function isWithinBusinessHours(datetime) {
  try {
    const date = new Date(datetime);
    const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    const dayName = days[date.getDay()];
    const hours = CONFIG.hours[dayName];
    if (!hours) return { available: false, reason: `Sorry, we're closed on ${dayName.charAt(0).toUpperCase() + dayName.slice(1)}s.` };
    const hour = date.getHours();
    const [openH] = hours.open.split(':').map(Number);
    const [closeH] = hours.close.split(':').map(Number);
    if (hour < openH || hour >= closeH) return { available: false, reason: `Sorry, that time is outside our hours (${hours.open}–${hours.close} on ${dayName.charAt(0).toUpperCase() + dayName.slice(1)}s).` };
    return { available: true };
  } catch(e) { return { available: true }; }
}

async function checkCalendarAvailability(datetime, duration) {
  try {
    const res = await fetch('/api/check-availability', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: CONFIG.slug, datetime, duration_minutes: duration || 30 })
    });
    const data = await res.json();
    return data;
  } catch(e) {
    return { available: true };
  }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  document.getElementById('quick-replies').innerHTML = '';
  addBubble(msg, 'user');
  history.push({ role: 'user', content: msg });
  addTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json'}, 
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system: systemPrompt, messages: history })
    });
    const data = await res.json();
    removeTyping();
    const text = data.content?.map(b => b.text || '').join('') || '';
    history.push({ role: 'assistant', content: text });
    let parsed = null;
    try { const m = text.match(/\{[\s\S]*\}/); if (m) parsed = JSON.parse(m[0]); } catch(e) {}
    if (parsed?.booking) {
      const hoursCheck = isWithinBusinessHours(parsed.booking.datetime);
      if (!hoursCheck.available) {
        addBubble(hoursCheck.reason + " Want to pick a different time?", 'bot');
        return;
      }
      addTyping();
      const calCheck = await checkCalendarAvailability(parsed.booking.datetime, 30);
      removeTyping();
      if (!calCheck.available) {
        addBubble("Sorry, that time is already booked! How about a different time?", 'bot');
        history.push({ role: 'assistant', content: "Sorry, that time is already booked! How about a different time?" });
      } else {
        addBubble(parsed.reply, 'bot');
        showBookingCard(parsed.booking);
      }
    } else {
      addBubble(text, 'bot');
      if (history.length === 2) showQuickReplies(['Haircut', 'Fade', 'Beard trim', 'Shape up'], true);
    }
  } catch(e) { removeTyping(); addBubble('Sorry, something went wrong. Please try again!', 'bot'); }
}

function showBookingCard(b) {
  bookingData = b;
  document.getElementById('bc-service').textContent = b.service || '—';
  document.getElementById('bc-datetime').textContent = b.datetime || '—';
  document.getElementById('bc-duration').textContent = b.duration || '—';
  document.getElementById('bc-notes').textContent = b.notes || 'None';
  document.getElementById('booking-card').classList.add('show');
}

async function confirmBooking() {
  document.getElementById('booking-card').classList.remove('show');
  addTyping();
  try {
    const res = await fetch('/api/create-event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        slug: CONFIG.slug,
        datetime: bookingData.datetime,
        duration_minutes: 30,
        service: bookingData.service,
        notes: bookingData.notes,
        timezone: CONFIG.timezone
      })
    });
    const data = await res.json();
    removeTyping();
    if (data.success) {
      addBubble("You're booked! ✂️ See you soon at Kayden's Haircuts! Your appointment has been added to the calendar 📅", 'bot');
    } else {
      addBubble("You're booked! ✂️ See you soon at Kayden's Haircuts!", 'bot');
    }
  } catch(e) {
    removeTyping();
    addBubble("You're booked! ✂️ See you soon at Kayden's Haircuts!", 'bot');
  }
  history = [];
  bookingData = null;
}

// --- TIME PICKER ---
let busySlots = [];
let selectedService = null;
let selectedDay = null;

const SERVICE_DURATIONS = {
  'haircut': 30, 'haircut & beard trim': 45, 'fade': 30,
  'shape up': 20, 'wash & cut': 45, 'kids haircut': 20
};

async function showTimePicker(service) {
  selectedService = service;
  document.getElementById('time-picker').classList.add('show');
  document.getElementById('quick-replies').innerHTML = '';

  // Fetch busy slots for next 7 days
  const now = new Date();
  const end = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
  try {
    const res = await fetch('/api/get-slots', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: CONFIG.slug, start_date: now.toISOString(), end_date: end.toISOString() })
    });
    const data = await res.json();
    busySlots = data.busy || [];
  } catch(e) { busySlots = []; }

  buildDayTabs();
}

function buildDayTabs() {
  const tabs = document.getElementById('day-tabs');
  tabs.innerHTML = '';
  const days = ['sun','mon','tue','wed','thu','fri','sat'];
  const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const now = new Date();

  for (let i = 0; i < 7; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() + i);
    const dayName = dayNames[d.getDay()];
    const isClosed = !CONFIG.hours[dayName];
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (isClosed ? ' closed' : '') + (i === 0 ? ' active' : '');
    tab.innerHTML = `<div>${days[d.getDay()].toUpperCase()}</div><div style="font-size:13px;font-weight:700">${d.getDate()}</div>`;
    if (!isClosed) {
      tab.onclick = () => {
        document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedDay = d;
        buildSlots(d);
      };
    }
    tabs.appendChild(tab);
    if (i === 0 && !isClosed) { selectedDay = d; buildSlots(d); }
  }
}

function buildSlots(date) {
  const grid = document.getElementById('slots-grid');
  grid.innerHTML = '';
  const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const dayName = dayNames[date.getDay()];
  const hours = CONFIG.hours[dayName];
  if (!hours) { grid.innerHTML = '<div class="slots-loading">Closed</div>'; return; }

  const [openH, openM] = hours.open.split(':').map(Number);
  const [closeH, closeM] = hours.close.split(':').map(Number);
  const duration = SERVICE_DURATIONS[selectedService?.toLowerCase()] || 30;

  let t = openH * 60 + openM;
  const end = closeH * 60 + closeM;
  const now = new Date();

  while (t + duration <= end) {
    const h = Math.floor(t / 60);
    const m = t % 60;
    const slotDate = new Date(date);
    slotDate.setHours(h, m, 0, 0);

    // Skip past times
    if (slotDate <= now) { t += 30; continue; }

    const slotEnd = new Date(slotDate.getTime() + duration * 60000);
    const isBooked = busySlots.some(b => {
      const bs = new Date(b.start);
      const be = new Date(b.end);
      return slotDate < be && slotEnd > bs;
    });

    const btn = document.createElement('button');
    btn.className = 'slot-btn ' + (isBooked ? 'booked' : 'available');
    btn.textContent = `${h % 12 || 12}:${String(m).padStart(2,'0')}${h < 12 ? 'am' : 'pm'}`;
    if (!isBooked) {
      btn.onclick = () => selectSlot(slotDate, duration);
    }
    grid.appendChild(btn);
    t += 30;
  }

  if (grid.children.length === 0) {
    grid.innerHTML = '<div class="slots-loading">No available slots</div>';
  }
}

function selectSlot(date, duration) {
  document.getElementById('time-picker').classList.remove('show');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const h = date.getHours();
  const m = date.getMinutes();
  const timeStr = `${h % 12 || 12}:${String(m).padStart(2,'0')}${h < 12 ? 'am' : 'pm'}`;
  const dateStr = `${days[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}`;
  const pad = n => String(n).padStart(2,'0');
  const isoStr = `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(h)}:${pad(m)}:00`;

  showBookingCard({
    service: selectedService,
    datetime: isoStr,
    duration: `${duration} min`,
    notes: ''
  });

  addBubble(`${selectedService} on ${dateStr} at ${timeStr}`, 'user');
  history.push({ role: 'user', content: `Book ${selectedService} on ${dateStr} at ${timeStr}` });
}

document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

window.onload = () => {
  setTimeout(() => {
    addBubble("What's good! Welcome to Kayden's Haircuts ✂️ What can I book you in for?", 'bot');
    showQuickReplies(['Haircut', 'Fade', 'Beard trim', 'Shape up'], true);
  }, 600);
};
</script>
</body>
</html>
